# cargo-deny policy for the QantmOrchstrtr-RSI Rust workspace.
#
# Landed under ARY-1883 Phase 2a Step 2 per ADR-014 Slice 1 Addendum 2a
# §10 (docs/adr/adr-014-slice-1-addendum-2a-client.md). Covers:
#
#   1. [advisories]  — block on any vulnerability advisory in the
#                      RustSec database.
#   2. [licenses]    — allowlist of permissive licenses we vetted.
#   3. [bans]        — explicit denials of native-tls / openssl-sys
#                      so the workspace cannot regress to a non-rustls
#                      TLS stack (Addendum 2a §2 "Anti-pin").
#   4. [sources]     — only allow crates.io and our own GitHub org.
#
# Run locally:
#     cargo install cargo-deny
#     cargo deny check
#
# CI integration (separate task) lifts this to a required check on PRs.

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
version = 2
# Allowlist of permissive licenses that are compatible with our
# proprietary distribution (per legal review 2026-05).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Addendum 2a §2 "Anti-pin": NO native-tls; use rustls + rustls::crypto::ring.
# These crates are banned outright because they pull in OpenSSL via
# system libraries, which we explicitly do not want in any binary the
# Safety Kernel client links into.
deny = [
    { name = "native-tls" },
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "openssl-probe" },
    # PT-1883-01 (ARY-2113): ADR-014 Addendum 2a §2 forbids aws-lc-rs;
    # use rustls + rustls::crypto::ring instead.
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allow first-party GitHub sources (ARYA-Labs-PBC org) so we can
# vendor patched forks if needed without tripping the source ban.
allow-org = { github = ["ARYA-Labs-PBC"] }
