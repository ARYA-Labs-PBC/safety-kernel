# Safety Kernel HTTP contract.
#
#  The
# spec below mirrors the current Python (FastAPI) implementation at
# `apps/safety_kernel/routes/{authorize,approvals,meta}.py`. The Rust
# port lands in `crates/services/safety-kernel/` (future) and MUST
# conform byte-equivalently to this contract.
#
# Authorization model: every endpoint inspects the caller's role via
# `request.state.kernel_caller_role`, set by middleware based on the
# pre-shared API key (`x-api-key`). Roles: `worker`, `api`, `operator`.
# Roles are NOT in the OpenAPI schema (they're set out-of-band by the
# middleware) but are documented per-endpoint.
openapi: 3.1.0
info:
  title: safety-kernel
  version: 1.0.0
  description: |
    Authorization, attestation, and audit-chain service for sensitive
    operations across the safety-kernel. The kernel is the
    only component authorized to mint signed tokens for actions like
    and approval decisions.

    Caller roles (set by middleware via `x-api-key`):
    - `worker` — primary caller; authorized to request tokens for
      training and runtime actions
    - `api` — REST API; restricted to governance-only actions per
      `is_api_action_allowed` allowlist
    - `operator` — human approvals/rejections only
  contact:
    name: ARYA Labs Safety Kernel team
    url: https://github.com/ARYA-Labs-PBC/safety-kernel
  license:
    name: Proprietary
servers:
  - url: http://safety-kernel-rust:9000
    description: Internal docker network (production)
  - url: http://localhost:9001
    description: Host port mapping (local development)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        Pre-shared key set in `.env` per role:
        - `QORCH_KERNEL_API_KEY_WORKER`
        - `QORCH_KERNEL_API_KEY_API`
        - `QORCH_KERNEL_API_KEY_OPERATOR`

  schemas:
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          description: Always `true` when the kernel is up
        version:
          type: string
          description: Kernel build version (semver)
        uptime_s:
          type: number
          format: double
          description: Seconds since process start

    PublicKeyResponse:
      type: object
      required: [public_key_b64, public_key_fingerprint]
      properties:
        public_key_b64:
          type: string
          description: Base64-encoded Ed25519 public key (raw bytes)
        public_key_fingerprint:
          type: string
          description: SHA-256 fingerprint of the public key (hex)

    AuthorizeRequest:
      type: object
      required: [action, run_id, subject, params_fingerprint]
      properties:
        action:
          type: string
          minLength: 1
          description: Sensitive action to authorize (e.g.)
        run_id:
          type: string
          minLength: 1
          description: Run identifier bound into the token
        subject:
          type: string
          minLength: 1
          description: Worker identity / subject requesting authorization
        params_fingerprint:
          type: string
          minLength: 1
          pattern: ^[0-9a-f]{64}$
          description: SHA-256 fingerprint of parameters (stable JSON)
        params:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional params used for policy decisions (fingerprinted)
        ttl_s:
          type: integer
          minimum: 1
          maximum: 3600
          nullable: true
          description: Requested TTL seconds (kernel will clamp)
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional metadata for audit (not used in token binding)

    AuthorizeResponse:
      type: object
      required: [ok, token, token_sha256, claims]
      properties:
        ok:
          type: boolean
          enum: [true]
        token:
          type: string
          description: Ed25519-signed compact JWT token
        token_sha256:
          type: string
          pattern: ^[0-9a-f]{64}$
          description: SHA-256 of the token string (for audit)
        claims:
          type: object
          additionalProperties: true
          description: Decoded claims (action, run_id, subject, exp, etc.)

    ApproveRequest:
      type: object
      required: [approver, proposal_fingerprint]
      properties:
        approver:
          type: string
          minLength: 1
          description: Approver identifier (email/name/system)
        proposal_fingerprint:
          type: string
          minLength: 1
          description: Fingerprint of proposal content being approved
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    RejectRequest:
      type: object
      required: [approver, proposal_fingerprint]
      properties:
        approver:
          type: string
          minLength: 1
        proposal_fingerprint:
          type: string
          minLength: 1
        reason:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          nullable: true

    SignedDecisionResponse:
      type: object
      required: [ok, item_id, decision, token, token_sha256, claims]
      properties:
        ok:
          type: boolean
          enum: [true]
        item_id:
          type: string
        decision:
          type: string
          enum: [approved, rejected]
        token:
          type: string
        token_sha256:
          type: string
          pattern: ^[0-9a-f]{64}$
        claims:
          type: object
          additionalProperties: true

    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
          enum: [false]
        error:
          type: string
          description: Stable machine-readable error code
        reason:
          type: string
          description: Optional human-readable reason

    # ------------------------------------------------------------------
    # /policy/* () — module-load / exec / compile
    # authorization.  freezes ONLY PolicyModuleAuthorize{Request,
    # AllowResponse, DenyResponse}. The /policy/module/register,
    # /policy/audit-event, /policy/module/{path}/status endpoints are
    # listed in `paths:` with a DRAFT description and 501-only
    # responses; slice 2 fixes their request/response schemas.
    # ------------------------------------------------------------------
    PolicyModuleAuthorizeRequest:
      type: object
      required: [event_kind, module_path, caller_subject, caller_run_id, event_fingerprint]
      properties:
        event_kind:
          type: string
          enum: [import, exec, compile]
          description: CPython audit-event class that triggered the call
        module_path:
          type: string
          minLength: 1
          description: |
            For `import`: the dotted module name (`pkg.sub.mod`).
            For `exec` / `compile`: the SHA-256 hex of the source string
            (the source itself is NOT sent over the wire).
        caller_subject:
          type: string
          minLength: 1
          description: |
            Worker identity (matches the `subject` field on
            `/kernel/v1/authorize`). Lets the kernel correlate this
            event to an in-flight action authorization.
        caller_run_id:
          type: string
          minLength: 1
          description: Run identifier bound into the resulting decision token
        event_fingerprint:
          type: string
          pattern: ^[0-9a-f]{64}$
          description: |
            SHA-256 of the canonicalized event payload
            (event_kind, module_path, caller_subject, caller_run_id).
            Bound into the signed decision so a recorded ALLOW cannot
            be replayed against a different event.
        expected_required_patterns:
          type: array
          items:
            type: string
          nullable: true
          description: |
            Optional regex patterns the caller expects this `module_path`
            to require.  uses these for drift validation: if the
            registry's recorded patterns do not equal the caller's
            expected set, the kernel returns 412 Precondition Failed.
            Lets the caller detect registry / code skew before the
            operation runs. Reflects the Rust `ModuleAuthorizeRequest`
            type in `crates/domain/src/safety/policy/types.rs`; 
            §"OpenAPI delta" amendment documents the slice-2 semantics.
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional audit metadata (not bound into the token)

    PolicyModuleAuthorizeAllowResponse:
      type: object
      required: [ok, decision, token, token_sha256, claims]
      properties:
        ok:
          type: boolean
          enum: [true]
        decision:
          type: string
          enum: [allow]
        token:
          type: string
          description: Ed25519-signed compact JWT, same envelope as `/kernel/v1/authorize`
        token_sha256:
          type: string
          pattern: ^[0-9a-f]{64}$
        claims:
          type: object
          additionalProperties: true
          description: Decoded claims (event_kind, module_path, exp, etc.)

    PolicyModuleAuthorizeDenyResponse:
      type: object
      required: [ok, decision, token, token_sha256, claims, reason]
      properties:
        ok:
          type: boolean
          enum: [false]
        decision:
          type: string
          enum: [deny]
        token:
          type: string
          description: Ed25519-signed DENY decision (replayable for audit)
        token_sha256:
          type: string
          pattern: ^[0-9a-f]{64}$
        claims:
          type: object
          additionalProperties: true
        reason:
          type: string
          minLength: 1
          description: Machine-readable refusal reason (e.g., `module_not_registered`)

  responses:
    Unauthorized:
      description: Missing / invalid `x-api-key`
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: |
        Role-based forbidden. `caller_role_forbidden` (unknown role) or
        `caller_role_not_operator` (operator-only endpoint) or
        `api_action_forbidden` (API role attempting non-governance action).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /health:
    get:
      operationId: getLegacyHealth
      summary: Health check (legacy path)
      description: |
        Legacy health endpoint kept for backward compatibility with
        clients that haven't migrated to `/kernel/v1/health`. Both
        return identical payloads.
      tags: [meta]
      security: []  # public
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /kernel/v1/health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [meta]
      security: []  # public
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /kernel/v1/public_key:
    get:
      operationId: getPublicKey
      summary: Get kernel public key for token verification
      description: |
        Returns the Ed25519 public key clients use to verify signed
        tokens (authorize / approve / reject responses). Public —
        no authentication required.
      tags: [meta]
      security: []  # public
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyResponse'

  /kernel/v1/authorize:
    post:
      operationId: postAuthorize
      summary: Authorize a sensitive action (signed token)
      description: |
        Returns a signed Ed25519 token authorizing the specified action
        for the specified subject. The token's `exp` claim is the kernel's
        clamped TTL; clients MUST honour it. The audit chain records
        the authorization decision before the token is returned.
      tags: [kernel]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation error (Pydantic / FastAPI default body)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /kernel/v1/approvals/{item_id}/approve:
    post:
      operationId: postApprove
      summary: Sign an approval decision
      description: |
        Operator-only endpoint. Mints a signed token attesting the
        approver decided `approved` on `item_id`. Records the decision
        in the audit chain.
      tags: [approvals]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRequest'
      responses:
        '200':
          description: Decision signed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedDecisionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /kernel/v1/approvals/{item_id}/reject:
    post:
      operationId: postReject
      summary: Sign a rejection decision
      description: |
        Operator-only endpoint. Mints a signed token attesting the
        approver decided `rejected` on `item_id`. The optional `reason`
        is bound into the token claims for audit.
      tags: [approvals]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        '200':
          description: Decision signed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignedDecisionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ------------------------------------------------------------------
  # /policy/* —  policy engine surface.
  #
  #  FREEZES `POST /policy/module/authorize`. The other three
  # endpoints are DRAFT (501-only response) until slice 2 fixes their
  # request/response shapes. Clients MUST NOT implement against draft
  # endpoints — they are listed here only so the surface is discoverable
  # and the URL shapes are reserved.
  # ------------------------------------------------------------------

  /policy/module/authorize:
    post:
      operationId: policyModuleAuthorize
      summary: Authorize a module-load or code-execution event
      description: |
        Called by the in-process Python audit hook (or any language
        runtime guard) on `import`, `exec`, or `compile` events.
        Returns an Ed25519-signed ALLOW token on success, an Ed25519-
        signed DENY decision with a `reason` on policy refusal, or
        503 `KernelUnavailable` if the kernel cannot reach its
        decision backend.

        Caller role: `worker` (the audit-hook reference uses the
        worker API key — it is part of the live workload process).
        `api` role is forbidden here (api actions go through
        `/kernel/v1/authorize`).
      tags: [policy]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyModuleAuthorizeRequest'
      responses:
        '200':
          description: ALLOW — signed decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyModuleAuthorizeAllowResponse'
        '403':
          description: DENY — signed decision with `reason`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyModuleAuthorizeDenyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: KernelUnavailable — decision backend unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policy/module/register:
    post:
      operationId: policyModuleRegister
      summary: (DRAFT) Register a module path with required-pattern set
      description: |
        DRAFT — schema may change in slice 2; do not implement clients
        against this shape.  will register a module path plus
        the regex pattern set required for future authorize calls on
        that path.
      tags: [policy]
      security:
        - ApiKeyAuth: []
      responses:
        '501':
          description: Not Implemented — slice-1 scaffold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policy/audit-event:
    post:
      operationId: policyAuditEvent
      summary: (DRAFT) Surface a non-decision policy audit event
      description: |
        DRAFT — schema may change in slice 2; do not implement clients
        against this shape.  will accept non-decision audit
        events (e.g., a hook that detected modules loaded before
        installation; see  §"Open questions").
      tags: [policy]
      security:
        - ApiKeyAuth: []
      responses:
        '501':
          description: Not Implemented — slice-1 scaffold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /policy/module/{module_path}/status:
    get:
      operationId: policyModuleStatus
      summary: (DRAFT) Query module registration and recent decisions
      description: |
        DRAFT — schema may change in slice 2; do not implement clients
        against this shape.  will return the current
        registration and recent decision history for a module path.
      tags: [policy]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: module_path
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '501':
          description: Not Implemented — slice-1 scaffold
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: meta
    description: Health and metadata endpoints (public)
  - name: kernel
    description: Token issuance for sensitive worker actions
  - name: approvals
    description: Operator-signed approve/reject decisions
  - name: policy
    description: |
      Policy engine — module-load / exec / compile authorization. This
      release freezes `/policy/module/authorize`; the register /
      audit-event / status endpoints are DRAFT and 501-only.
